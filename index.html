            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-top: 20px;
        }

        .logo {
            width: 80px;
            filter: drop-shadow(0 0 10px #4CAF50);
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Container Kamera Bulat seperti di Gambar */
        .camera-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 30px 0;
            border-radius: 50%;
            border: 4px solid var(--blue);
            box-shadow: 0 0 20px var(--blue);
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Tombol Menu */
        .button-group {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 15px 5px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn-hadir { background: var(--primary); box-shadow: 0 4px #2e7d32; }
        .btn-ijin { background: var(--orange); box-shadow: 0 4px #d35400; }
        .btn-tugas { background: var(--blue); box-shadow: 0 4px #1c5980; }

        .btn:active { transform: translateY(4px); box-shadow: none; }

        .status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            text-align: center;
            padding: 0 10px;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>

        <div class="title">ABSENSI DIGITAL<br>PEMDES PUCAKSARI</div>
    </div>

    <div class="camera-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="button-group">
        <button class="btn btn-hadir" onclick="prosesAbsen('Hadir')">HADIR</button>
        <button class="btn btn-ijin" onclick="prosesAbsen('Ijin')">IJIN</button>
        <button class="btn btn-tugas" onclick="prosesAbsen('Tugas Luar')">TUGAS LUAR</button>
    </div>

    <div class="status-msg" id="statusMsg">SIAP MELAKUKAN SCAN...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw6e1T020cZW9D29eibuWAbY-u7BaqVp0bK9FH-xBYTTxRKoX3dgP0U0rv3zM2oemrM/exec";
        let faceMatcher = null;

        async function init() {
            try {
                // 1. Load Model
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                // 2. Akses Kamera
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                document.getElementById('video').srcObject = stream;

                // 3. Ambil Data Wajah Referensi dari Database
                const response = await fetch(API_URL + "?p=data_all");
                const data = await response.json();
                
                const labeledDescriptors = data.perangkat.slice(1).map(row => {
                    if(!row[2]) return null;
                    return new faceapi.LabeledFaceDescriptors(row[0], [new Float32Array(JSON.parse(row[2]))]);
                }).filter(d => d !== null);

                if(labeledDescriptors.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                }

                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert("Gagal memuat kamera/database. Pastikan https aktif.");
            }
        }

        async function prosesAbsen(status) {
            const video = document.getElementById('video');
            const msg = document.getElementById('statusMsg');
            
            msg.innerText = "MENGENALI WAJAH...";
            
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                msg.innerText = "WAJAH TIDAK TERDETEKSI!";
                return;
            }

            if (!faceMatcher) {
                msg.innerText = "DATA PERANGKAT KOSONG!";
                return;
            }

            const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
            
            if (bestMatch.label === 'unknown') {
                msg.innerText = "WAJAH TIDAK DIKENALI!";
            } else {
                msg.innerText = "MENYIMPAN DATA: " + bestMatch.label;
                
                const payload = {
                    action: 'absen',
                    nama: bestMatch.label,
                    jabatan: 'Perangkat Desa', // Bisa dioptimalkan ditarik dari DB
                    status: status
                };

                fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                })
                .then(res => res.text())
                .then(text => {
                    msg.innerHTML = `ABSENSI BERHASIL!<br>${bestMatch.label.toUpperCase()} ANDA TEPAT WAKTU`;
                });
            }
        }

        init();
    </script>
